# .github/workflows/build-nuitka-ref.yml
#
# Build an unstripped Nuitka binary as a reference for BinDiff / Diaphora
# symbol porting into a stripped target (e.g. flake.exe).
#
# Key design points:
#   * --unstripped keeps symbols WITHOUT enabling --debug (which would add
#     assertion code paths and hurt function matching).
#   * --lto=no preserves function boundaries so the graph matcher lines up.
#   * We let Nuitka find MSVC itself via its --msvc=VERSION selector; both
#     windows-2022 and windows-2019 runners ship VS Build Tools pre-installed.
#   * Artifact name encodes all three fingerprints so you can upload several
#     builds and pick the one that matches flake.exe best.

name: build-nuitka-ref

on:
  workflow_dispatch:
    inputs:
      python_version:
        description: "Python version (match target's python3XX.dll, e.g. 3.11.9)"
        required: true
        default: "3.11.9"
      nuitka_version:
        description: "Nuitka version (identified from strings/helpers in target)"
        required: true
        default: "2.4.8"
      toolchain:
        description: "Compiler"
        required: true
        default: "msvc"
        type: choice
        options: [msvc, mingw]
      msvc_version:
        description: "MSVC selector for Nuitka (14.2=VS2019, 14.3=VS2022, latest)"
        required: false
        default: "14.3"
      arch:
        description: "Target arch"
        required: true
        default: "x64"
        type: choice
        options: [x64, x86]
      runner:
        description: "Runner image (pair 14.3 with windows-2022, 14.2 with windows-2019)"
        required: true
        default: "windows-2022"
        type: choice
        options: [windows-2022, windows-2019, windows-latest]

jobs:
  build:
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ inputs.python_version }} (${{ inputs.arch }})
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          architecture: ${{ inputs.arch }}

      - name: Install Nuitka ${{ inputs.nuitka_version }}
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install "nuitka==${{ inputs.nuitka_version }}"
          python -m nuitka --version

      - name: Compile unstripped reference binary
        shell: pwsh
        env:
          # Nuitka passes $CCFLAGS/$LDFLAGS through to the C compiler on top
          # of its own flags. --unstripped only controls whether strip is
          # called; without -g gcc emits no DWARF in the first place.
          # Safe to set unconditionally: cl.exe ignores $CCFLAGS (uses $CL),
          # so the MSVC path is unaffected.
          CCFLAGS: ${{ inputs.toolchain == 'mingw' && '-g -gdwarf-4 -fno-eliminate-unused-debug-types' || '' }}
        run: |
          $nargs = @(
            '-m', 'nuitka',
            '--standalone',
            '--assume-yes-for-downloads',
            '--unstripped',
            '--lto=no',
            '--show-scons',
            '--no-progressbar',
            '--output-dir=build'
          )
          if ('${{ inputs.toolchain }}' -eq 'msvc') {
            $nargs += '--msvc=${{ inputs.msvc_version }}'
          } else {
            $nargs += '--mingw64'
          }
          $nargs += 'target.py'
          Write-Host "nuitka args:" ($nargs -join ' ')
          python @nargs

      - name: Diagnose PE sections (look for .debug_*)
        if: inputs.toolchain == 'mingw'
        shell: pwsh
        run: |
          # Find objdump from the Nuitka-managed MinGW cache.
          $objdump = Get-ChildItem "$env:LOCALAPPDATA\Nuitka\Nuitka\Cache\downloads\gcc" `
                      -Recurse -Filter 'objdump.exe' -ErrorAction SilentlyContinue |
                     Select-Object -First 1 -ExpandProperty FullName
          if (-not $objdump) { throw "objdump not found under Nuitka cache" }
          $exe = (Get-ChildItem build -Recurse -Filter 'target.exe' | Select-Object -First 1).FullName
          Write-Host "objdump: $objdump"
          Write-Host "exe:     $exe"
          Write-Host ""
          Write-Host "=== all PE sections (discardable ones DO show up here) ==="
          & $objdump -h $exe
          Write-Host ""
          Write-Host "=== .debug_* sections only ==="
          & $objdump -h $exe | Select-String -Pattern '\.debug'
          Write-Host ""
          Write-Host "=== .debug section CONTENTS flags (D = discardable) ==="
          # Helps answer: 'is IDA hiding them because of the DISCARDABLE flag?'
          & $objdump -hw $exe | Select-String -Pattern '\.debug' -Context 0,1

      - name: Split DWARF into companion .dbg (MinGW)
        if: inputs.toolchain == 'mingw'
        shell: pwsh
        run: |
          $objcopy = Get-ChildItem "$env:LOCALAPPDATA\Nuitka\Nuitka\Cache\downloads\gcc" `
                      -Recurse -Filter 'objcopy.exe' -ErrorAction SilentlyContinue |
                     Select-Object -First 1 -ExpandProperty FullName
          if (-not $objcopy) { throw "objcopy not found under Nuitka cache" }
          $exe = (Get-ChildItem build -Recurse -Filter 'target.exe' | Select-Object -First 1).FullName
          $dbg = "$exe.dbg"
          # --only-keep-debug writes a separate file containing just .debug_* sections.
          & $objcopy --only-keep-debug $exe $dbg
          Write-Host "Produced debug file:"
          Get-Item $dbg | Format-List FullName, Length

      - name: Collect outputs (.exe, .pdb, build/*.obj)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null

          # dist dir is named <main_module>.dist (e.g. target.dist).
          # Discover it so the workflow keeps working if target.py is renamed.
          $distDir = Get-ChildItem -Path build -Filter '*.dist' -Directory -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $distDir) { throw "No *.dist directory found under build/" }
          Write-Host "Found dist dir: $($distDir.FullName)"
          Copy-Item -Recurse $distDir.FullName artifacts/

          # PDBs from MSVC link (if any) + .dbg from objcopy (MinGW)
          Get-ChildItem -Recurse build -Include *.pdb,*.dbg -ErrorAction SilentlyContinue |
            Copy-Item -Destination artifacts/ -Force

          # Intermediate *.build dir -- .c/.obj files, useful for per-TU symbol recovery
          $buildDir = Get-ChildItem -Path build -Filter '*.build' -Directory -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($buildDir) {
            Compress-Archive -Path $buildDir.FullName -DestinationPath artifacts/intermediate.build.zip
          }

          Write-Host "=== artifact manifest ==="
          Get-ChildItem -Recurse artifacts | Select-Object FullName, Length | Format-Table -AutoSize

      - name: Upload reference bundle
        uses: actions/upload-artifact@v4
        with:
          name: nuitka-ref-py${{ inputs.python_version }}-n${{ inputs.nuitka_version }}-${{ inputs.toolchain }}${{ inputs.msvc_version }}-${{ inputs.arch }}
          path: artifacts/
          retention-days: 14
          if-no-files-found: error

# ---------------------------------------------------------------------------
# Batch mode: replace the job above with a matrix if you want to try several
# version combos in one run. Example:
#
# jobs:
#   build:
#     strategy:
#       fail-fast: false
#       matrix:
#         python:   ["3.10.14", "3.11.9", "3.12.6"]
#         nuitka:   ["2.3.11", "2.4.8", "2.5.1"]
#         msvc:     ["14.3"]
#     runs-on: windows-2022
#     ...
# ---------------------------------------------------------------------------
